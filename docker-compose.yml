services:
  db:
    image: postgres:15-alpine
    container_name: sourcemind_postgres
    restart: always
    environment:
      POSTGRES_USER: sourcemind
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sourcemind
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: sourcemind_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: sourcemind_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: sourcemind_minio
    restart: always
    environment:
      MINIO_ROOT_USER: sourcemind
      MINIO_ROOT_PASSWORD: sourcemind_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sourcemind_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=supersecretkey_change_in_production
      - ALGORITHM=HS256
      - ENVIRONMENT=production
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=sourcemind
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=sourcemind
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_URL=minio:9000
      - MINIO_ROOT_USER=sourcemind
      - MINIO_ROOT_PASSWORD=sourcemind_password
      - MINIO_SECURE=false
